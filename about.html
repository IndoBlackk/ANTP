<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTP | Coming Soon</title>
    <!-- ANTP FAVICON -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23f7f7f5'/%3E%3Crect x='6' y='6' width='8' height='8' fill='%23111110'/%3E%3Crect x='18' y='6' width='8' height='8' fill='none' stroke='%23111110' stroke-width='2'/%3E%3Crect x='6' y='18' width='8' height='8' fill='none' stroke='%23111110' stroke-width='2'/%3E%3Crect x='18' y='18' width='8' height='8' fill='%23111110'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --canvas: #f7f7f5;
            --ink: #111110; 
            --ink-faded: rgba(17, 17, 16, 0.4);
            --border: rgba(17, 17, 16, 0.15);
            --sans: 'Manrope', sans-serif;
            --serif: 'Cormorant Garamond', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--canvas);
            color: var(--ink);
            font-family: var(--sans);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: none;
            box-shadow: inset 0 0 150px rgba(17, 17, 16, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        ::selection {
            background: var(--ink);
            color: var(--canvas);
        }

        /* The Ink Engine */
        .ink-blend {
            mix-blend-mode: multiply;
            opacity: 0.92;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Custom Cursor */
        .cursor-dot {
            position: fixed;
            top: 0; left: 0;
            width: 8px; height: 8px;
            background-color: var(--ink);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            mix-blend-mode: multiply;
            transition: width 0.25s cubic-bezier(0.19, 1, 0.22, 1), 
                        height 0.25s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cursor-dot.hover-active {
            width: 16px;
            height: 16px;
        }

        /* Paper Pulp Texture */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.06"/%3E%3C/svg%3E');
            background-repeat: repeat;
            animation: shift-noise 0.2s steps(2) infinite;
        }

        @keyframes shift-noise {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        /* Typography */
        .meta-stamp {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--ink-faded);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .title {
            font-family: var(--serif);
            font-size: clamp(3.5rem, 5vw, 6rem);
            font-weight: 300;
            font-style: italic;
            color: var(--ink);
            line-height: 1;
            margin-bottom: 3rem;
            letter-spacing: -0.01em;
        }

        .back-btn {
            font-family: var(--sans);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--ink-faded);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.4s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
        }

        .back-btn:hover {
            color: var(--ink);
        }

        /* Soft Load Reveal */
        .reveal {
            opacity: 0;
            animation: fade-up 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            body { cursor: auto; }
            .cursor-dot { display: none; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay" id="noise"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <main class="ink-blend reveal">
        <div class="meta-stamp">Look, im a busy guy ok.</div>
        <h1 class="title">Coming soon.</h1>
        <a href="index.html" class="back-btn hover-target">Return to Index</a>
    </main>

    <!-- UI Logic for Cursor -->
    <script>
        const dot = document.getElementById('cursor-dot');
        const hoverTargets = document.querySelectorAll('.hover-target');

        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            cursorX = e.clientX;
            cursorY = e.clientY;
            dot.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;
        });

        hoverTargets.forEach((el) => {
            el.addEventListener('mouseenter', () => dot.classList.add('hover-active'));
            el.addEventListener('mouseleave', () => dot.classList.remove('hover-active'));
        });
    </script>
</body>
</html>
